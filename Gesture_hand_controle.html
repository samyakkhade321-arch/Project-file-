<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>✋ Hand-Control Cube - Phase 3</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background: #0a0a14; 
      overflow: hidden; 
      touch-action: none;
      color: white;
    }
    #videoContainer {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      display: none;
      z-index: 1;
      background: #000;
    }
    #videoElement {
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* Mirror for natural feel */
    }
    #canvas3d {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 2;
    }
    #overlay {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 3; pointer-events: none;
    }
    #ui {
      position: absolute; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      z-index: 10; text-align: center;
      width: 100%;
      max-width: 420px;
      padding: 0 20px;
    }
    #startBtn {
      background: linear-gradient(135deg, #00ff88, #00ccaa);
      color: #0a0a14;
      border: none; padding: 18px 40px;
      font-size: 19px; font-weight: 700;
      border-radius: 60px;
      cursor: pointer; 
      box-shadow: 0 8px 25px rgba(0, 255, 136, 0.4);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }
    #startBtn:hover { transform: scale(1.05); }
    #startBtn:active { transform: scale(0.95); }
    #status {
      margin-top: 14px;
      font-size: 15px;
      font-weight: 500;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    #instructions {
      position: absolute; top: 20px; left: 50%;
      transform: translateX(-50%);
      background: rgba(10,10,20,0.85);
      backdrop-filter: blur(12px);
      color: white; 
      font-size: 14px; 
      text-align: center;
      padding: 12px 24px;
      border-radius: 9999px;
      z-index: 10;
      max-width: 92%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Control Panel - Phase 3 */
    #controlPanel {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: rgba(15,15,30,0.92);
      backdrop-filter: blur(20px);
      padding: 18px 24px;
      border-radius: 30px;
      box-shadow: 0 10px 40px rgba(0,255,136,0.15);
      display: none;
      flex-direction: column;
      gap: 16px;
      min-width: 340px;
      border: 1px solid rgba(0,255,136,0.2);
    }
    .controls-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .control-btn {
      background: linear-gradient(135deg, #00ff88, #00ccaa);
      color: #0a0a14;
      border: none;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 9999px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,255,136,0.3);
      transition: all 0.2s;
      white-space: nowrap;
    }
    .control-btn:active { transform: scale(0.92); }
    .slider-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #aaffdd;
    }
    input[type="range"] {
      accent-color: #00ff88;
      width: 140px;
    }
    .toggle-btn {
      background: #222233;
      color: #aaffdd;
      border: 2px solid #00ff88;
    }
    .indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      padding: 4px 12px;
      background: rgba(0,255,136,0.15);
      border-radius: 9999px;
      color: #00ff88;
    }
  </style>
</head>
<body>
  
  <!-- Video feed -->
  <div id="videoContainer">
    <video id="videoElement" autoplay playsinline></video>
    <canvas id="overlay"></canvas>
  </div>
  
  <!-- 3D Canvas -->
  <canvas id="canvas3d"></canvas>
  
  <!-- Top Instructions -->
  <div id="instructions">
    👉 <strong>Index finger</strong> → Rotate<br>
    🤏 <strong>Pinch</strong> → Resize<br>
    ✋ <strong>Hide hand</strong> → Auto-rotate
  </div>

  <!-- Start UI -->
  <div id="ui">
    <button id="startBtn">
      🎥 Start Camera &amp; Hand Tracking
    </button>
    <div id="status">Ready when you are • Works best on mobile</div>
  </div>

  <!-- PHASE 3 CONTROL PANEL -->
  <div id="controlPanel">
    <div class="controls-row">
      <button id="resetBtn" class="control-btn">🔄 Reset Cube</button>
      <button id="randomColorBtn" class="control-btn">🎨 Random Color</button>
      <button id="fullscreenBtn" class="control-btn">⛶ Fullscreen</button>
    </div>
    
    <div class="controls-row">
      <div class="slider-label">
        Rotation<br>Sensitivity
        <input type="range" id="rotSlider" min="0.04" max="0.35" step="0.01" value="0.12">
      </div>
      <div class="slider-label">
        Scale<br>Sensitivity
        <input type="range" id="scaleSlider" min="4" max="18" step="0.5" value="10">
      </div>
    </div>

    <div class="controls-row">
      <button id="autoRotateToggle" class="control-btn toggle-btn">⏳ Auto-rotate: <span id="autoStatus">ON</span></button>
      <div id="gestureIndicator" class="indicator">
        <span id="handDot">●</span>
        <span id="gestureText">Waiting for hand...</span>
      </div>
    </div>
  </div>

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3/drawing_utils.js"></script>

  <script>
    // ====================== PHASE 3 - ENHANCED VERSION ======================
    // Improvements over original:
    // • Full control panel with sliders, reset, color randomizer, fullscreen
    // • Optimized overlay (size set only once)
    // • Smoother & configurable sensitivity
    // • Live gesture indicator + better status feedback
    // • Improved visuals (better lighting, shinier cube)
    // • Auto-rotate toggle
    // • Cleaner, more maintainable code
    // • Better mobile performance & UX

    let scene, camera, renderer, cube;
    let video, overlay, overlayCtx;
    let handLandmarker = null;
    let isTracking = false;
    let stream = null; // for cleanup

    // PHASE 3 configurable variables
    let rotationSensitivity = 0.12;
    let scaleFactor = 10;
    let autoRotateEnabled = true;
    let lastHandDetectedTime = 0;

    // ===== THREE.JS SETUP (enhanced visuals) =====
    function initThreeJS() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0a14);
      
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 5);
      
      renderer = new THREE.WebGLRenderer({ 
        canvas: document.getElementById('canvas3d'),
        antialias: true, 
        alpha: true 
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.5));
      renderer.shadowMap.enabled = false; // keep light & fast
      
      // Better cube material
      const geometry = new THREE.BoxGeometry(1.6, 1.6, 1.6);
      const material = new THREE.MeshPhongMaterial({ 
        color: 0x00ff88,
        shininess: 120,
        specular: 0xaaaaaa,
        transparent: true,
        opacity: 0.96,
        flatShading: false
      });
      cube = new THREE.Mesh(geometry, material);
      scene.add(cube);
      
      // Enhanced lighting
      scene.add(new THREE.AmbientLight(0xffffff, 0.6));
      const hemiLight = new THREE.HemisphereLight(0x00ff88, 0x112233, 0.8);
      scene.add(hemiLight);
      const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
      dirLight.position.set(4, 6, 5);
      scene.add(dirLight);
      
      // Subtle edge highlight (wireframe helper)
      const edges = new THREE.EdgesGeometry(geometry);
      const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 });
      const edgeLines = new THREE.LineSegments(edges, lineMaterial);
      cube.add(edgeLines);
      
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }

    // ===== MEDIAPIPE HANDS SETUP =====
    async function initHandTracking() {
      const statusEl = document.getElementById('status');
      
      try {
        statusEl.innerHTML = `⏳ Loading AI model <span style="color:#00ff88">•</span>`;
        
        const hands = new Hands({
          locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        
        hands.setOptions({
          maxNumHands: 1,
          modelComplexity: 1,
          minDetectionConfidence: 0.55,
          minTrackingConfidence: 0.55
        });
        
        hands.onResults((results) => {
          if (!isTracking) return;
          
          drawOverlay(results);
          
          if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            lastHandDetectedTime = Date.now();
            document.getElementById('handDot').style.color = '#00ff88';
            document.getElementById('gestureText').textContent = 'Hand detected ✓';
            processGestures(results.multiHandLandmarks[0]);
          } else {
            document.getElementById('handDot').style.color = '#ff6600';
            document.getElementById('gestureText').textContent = 'No hand • auto-rotate';
            if (autoRotateEnabled) {
              cube.rotation.x += 0.004;
              cube.rotation.y += 0.008;
            }
          }
        });
        
        handLandmarker = hands;
        return true;
        
      } catch (error) {
        console.error("Hand tracking init failed:", error);
        statusEl.textContent = "❌ Model failed to load";
        return false;
      }
    }

    // ===== OPTIMIZED OVERLAY DRAWING =====
    function drawOverlay(results) {
      overlayCtx.clearRect(0, 0, overlay.width, overlay.height);
      
      if (results.multiHandLandmarks) {
        for (const landmarks of results.multiHandLandmarks) {
          drawConnectors(overlayCtx, landmarks, HAND_CONNECTIONS, {
            color: '#00ff88', 
            lineWidth: 3.5
          });
          drawLandmarks(overlayCtx, landmarks, {
            color: '#ffaa00', 
            lineWidth: 1.5, 
            radius: 3.5
          });
        }
      }
    }

    // ===== CORE GESTURE LOGIC (with new sensitivity controls) =====
    function processGestures(landmarks) {
      const indexFinger = landmarks[8];
      const thumbTip = landmarks[4];
      
      // Rotation with smooth damping
      const targetY = (indexFinger.x - 0.5) * Math.PI * 2.8;
      const targetX = -(indexFinger.y - 0.5) * Math.PI * 1.8;
      
      cube.rotation.y += (targetY - cube.rotation.y) * rotationSensitivity;
      cube.rotation.x += (targetX - cube.rotation.x) * rotationSensitivity;
      
      // Pinch → scale
      const dx = indexFinger.x - thumbTip.x;
      const dy = indexFinger.y - thumbTip.y;
      const pinchDistance = Math.sqrt(dx*dx + dy*dy);
      
      const targetScale = THREE.MathUtils.clamp(
        2.2 - (pinchDistance * scaleFactor), 
        0.4, 
        2.4
      );
      cube.scale.setScalar(targetScale);
      
      // Visual feedback
      if (pinchDistance < 0.09) {
        cube.material.color.setHex(0xff6600);
      } else {
        cube.material.color.setHex(0x00ff88);
      }
    }

    // ===== CAMERA & TRACKING START =====
    async function startCamera() {
      const statusEl = document.getElementById('status');
      
      try {
        statusEl.innerHTML = `🔐 Asking for camera <span style="color:#00ff88">•</span>`;
        
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: 'user',
            width: { ideal: 640 },
            height: { ideal: 480 }
          }
        });
        
        video = document.getElementById('videoElement');
        video.srcObject = stream;
        await video.play();
        
        // Setup overlay once (major perf win)
        overlay = document.getElementById('overlay');
        overlayCtx = overlay.getContext('2d');
        overlay.width = video.videoWidth || 640;
        overlay.height = video.videoHeight || 480;
        
        // Show video & hide start button
        document.getElementById('videoContainer').style.display = 'block';
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('controlPanel').style.display = 'flex';
        
        // Start MediaPipe camera helper
        const cameraHelper = new Camera(video, {
          onFrame: async () => {
            if (handLandmarker && isTracking) {
              await handLandmarker.send({ image: video });
            }
          },
          width: 640,
          height: 480
        });
        cameraHelper.start();
        
        isTracking = true;
        statusEl.innerHTML = `✅ <span style="color:#00ff88">Tracking active</span> • Show your hand`;
        
      } catch (err) {
        console.error(err);
        statusEl.textContent = "❌ Camera access denied. Check permissions.";
      }
    }

    // ===== ANIMATION LOOP =====
    function animate() {
      requestAnimationFrame(animate);
      if (isTracking) renderer.render(scene, camera);
    }

    // ===== RESET CUBE =====
    function resetCube() {
      cube.rotation.set(0, 0, 0);
      cube.scale.setScalar(1);
      cube.material.color.setHex(0x00ff88);
    }

    // ===== MAIN ENTRY POINT =====
    async function main() {
      initThreeJS();
      animate();
      
      // Attach control panel listeners (once)
      document.getElementById('resetBtn').addEventListener('click', resetCube);
      
      document.getElementById('randomColorBtn').addEventListener('click', () => {
        const randomHex = Math.floor(Math.random() * 16777215);
        cube.material.color.setHex(randomHex);
      });
      
      document.getElementById('fullscreenBtn').addEventListener('click', () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {});
        } else {
          document.exitFullscreen();
        }
      });
      
      const rotSlider = document.getElementById('rotSlider');
      const scaleSlider = document.getElementById('scaleSlider');
      rotSlider.addEventListener('input', () => {
        rotationSensitivity = parseFloat(rotSlider.value);
      });
      scaleSlider.addEventListener('input', () => {
        scaleFactor = parseFloat(scaleSlider.value);
      });
      
      const toggleBtn = document.getElementById('autoRotateToggle');
      toggleBtn.addEventListener('click', () => {
        autoRotateEnabled = !autoRotateEnabled;
        const statusSpan = document.getElementById('autoStatus');
        statusSpan.textContent = autoRotateEnabled ? 'ON' : 'OFF';
        toggleBtn.style.borderColor = autoRotateEnabled ? '#00ff88' : '#ff6600';
      });
      
      // Start button
      document.getElementById('startBtn').addEventListener('click', async () => {
        const ready = await initHandTracking();
        if (ready) {
          await startCamera();
        }
      });
      
      // Cleanup on page leave
      window.addEventListener('beforeunload', () => {
        if (stream) stream.getTracks().forEach(track => track.stop());
      });
    }
    
    window.addEventListener('load', main);
  </script>
</body>
</html>
